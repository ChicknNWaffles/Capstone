{% load static %}

<!doctype html>
<html>
<head>
    <title>CoCodingStudio | editor</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

    <style>
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(230, 235, 255, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            cursor: pointer;
            color: rgba(230, 235, 255, 0.4);
            border-radius: 4px;
            transition: all 0.15s ease;
            padding: 0;
        }

        .icon-btn:hover {
            background: rgba(88, 120, 255, 0.15);
            color: rgba(150, 175, 255, 0.9);
        }

        .icon-btn:active {
            background: rgba(88, 120, 255, 0.25);
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        /* fariza's change: style buttons for running and stopping the project */
        .action-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            margin-right: 10px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.15s;
            background: rgba(88, 120, 255, 0.12);
            color: rgba(150, 175, 255, 0.8);
            border: 0.5px solid rgba(88, 120, 255, 0.2);
        }

        .btn-action:hover {
            background: rgba(88, 120, 255, 0.22);
            color: rgba(180, 200, 255, 1);
        }

        .btn-action:active {
            background: rgba(88, 120, 255, 0.32);
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="top-bar">

            <h3>Project:</h3>

        </div>
        <!-- fariza's change: added buttons to run and stop the project code -->
        <div class="action-group">
            <button id="runProjectBtn" class="btn-action" title="Launch Project" onclick="launchProject()">

                    <polygon points="6 4 20 12 6 20 6 4"></polygon>

        <button id="settingsBtn" class="settings-button" title="Project Settings">

<script>
    var fileTreeObj = {}
    var openTabs = {}

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // --- Original Host variable (Electron compatibility) ---
    const Host = window.location.protocol === 'file:' ? 'http://3.145.186.153:8000' : '';

    async function getfileTypesDictionary() {
        const result = await fetch("../Capstone/static/fileTypes.json");
        const jsonData = await result.json();
        return jsonData;
    }
    getfileTypesDictionary().then(data => FileTypes = data)

    async function getProjectName() {
        const storedProjectName = sessionStorage.getItem("currentProjectName");
        const projNameSpot = document.getElementById("projectName");
        if (storedProjectName && projNameSpot) {
            projNameSpot.innerHTML = storedProjectName;
        } else {
            try {
                const URL = Host + "/api/getProjName";
                const result = await fetch(URL);
                const data = await result.json();
                if (data && data.name && projNameSpot) {
                    projNameSpot.innerHTML = data.name;
                }
            } catch (err) {
                console.error("Error fetching project name:", err);
            }
        }
    }
    getProjectName();

    async function getFileDirectories() {
        const URL = Host + "/files/get/";
        const result = await fetch(URL);
        result.json().then((data) => {
            var files = data.files;
            var sorted = sortDirectories(files);
            fileTreeObj = sorted["/"];
            populateFileTree(sorted["/"]);
        });
    }
    getFileDirectories();

    async function checkDirectoriesForChange() {
        const URL = Host + "/files/get/";
        const result = await fetch(URL);
        result.json().then((data) => {
            var files = data.files;
            var sorted = sortDirectories(files);
            if (JSON.stringify(sorted["/"]) === JSON.stringify(fileTreeObj)) { } else {
                fileTreeObj = sorted["/"];
                refreshDirectory(sorted["/"]);
            }
        });
    }
    setInterval(async () => {
        await checkDirectoriesForChange();
    }, 5000)

    function refreshDirectory(files) {
        tree = document.getElementById("file-tree");
        tree.innerHTML = "";
        populateFileTree(files);
    }

    function identifyType(filename) {
        fileExtension = filename.substring(filename.lastIndexOf('.') + 1);
        if (FileTypes.hasOwnProperty(fileExtension)) {
            return FileTypes[fileExtension];
        } else if (filename.substr(filename.lastIndexOf('/') + 1) === "Dockerfile") {
            return FileTypes["dockerfile"]
        } else {
            return FileTypes["unknown"];
        }
    }

    function sortDirectories(files) {
        topLevel = { "/": {} };
        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var relPath = file.name;
            var prevLevels = [];
            var at = "/";
            var bottomFolder = topLevel[at];
            while (relPath.includes("/")) {
                var before = relPath.substr(0, relPath.indexOf("/"));
                var curFolder = topLevel;
                for (var j = 0; j < prevLevels.length; j++) {
                    curFolder = curFolder[prevLevels[j]];
                }
                curFolder = curFolder[at];
                if (Object.hasOwn(curFolder, before) == false) {
                    curFolder[before] = {};
                }
                curFolder = curFolder[before];
                prevLevels.push(at);
                at = before;
                relPath = relPath.substr(relPath.indexOf("/") + 1);
                bottomFolder = curFolder;
            }
            bottomFolder[relPath] = file;
        }
        return topLevel;
    }

    function generateTabHTML(id, fileName) {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        tabBar = document.getElementsByClassName("tab-bar")[0];
        html = "<div class='tab active' data-id='" + id + "' onclick='tabClick(this)'>";
        html = html + "<span class='tab-name'>" + fileName + "</span>";
        html = html + "<button class='tab-close' onclick='closeBtn(event, this)'>×</button>";
        html = html + "</div>";
        tabBar.innerHTML = tabBar.innerHTML + html
    }

    function generateFileTreeHTML(files, levels = 0) {
        html = "";
        for (step in files) {
            if (files[step].name !== undefined) {
                fileType = identifyType(files[step].name)
                language = fileType["language"];
                iconLink = fileType["icon"];
                const isLocked = files[step].is_locked;
                name = files[step].name.substr(files[step].name.lastIndexOf("/") + 1)

                html = html + "<div class='file-item lvl" + levels + "' data-file-id='" + files[step].id + "' data-is-locked='" + isLocked + "', data-lang='" + language + "', data-name='" + name + "'>";

                var fileIcon = `
                <span class="file-icon" style="position:relative;display:inline-flex;flex-shrink:0;margin-right:2px;">
                        <img width="18" height="18" src=` + iconLink + `>
                `
                if (isLocked) {
                    fileIcon = fileIcon + `
                        <span style="
                            position: absolute;
                            bottom: -3px;
                            right: -4px;
                            width: 9px;
                            height: 9px;
                            background: #5878ff;
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            border: 1.5px solid #0a1020;
                            ">
                        <svg width="5" height="5" viewBox="0 0 24 24" fill="white">
                            <path d="M12 2C9.243 2 7 4.243 7 7v3H6a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2v-8a2 2 0 00-2-2h-1V7c0-2.757-2.243-5-5-5zM9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9V7z"/>
                        </svg>
                    </span>
                    `
                }
                fileIcon = fileIcon + "</span>";

                const renameIcon = `
                    <span class="rename-icon" title="Rename file" onclick="event.stopPropagation(); renameFile('${files[step].id}', '${step}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                    </span>`;

                const deleteIcon = `
                    <span class="delete-icon" title="Delete file" onclick="event.stopPropagation(); deleteFile('${files[step].id}', '${step}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </span>`;

                html = html + fileIcon;
                html = html + "<span class='file-name'>" + step + "</span>";
                html = html + renameIcon;
                html = html + deleteIcon;
                html = html + "</div>";

            } else {
                html = html + "<div class='file-item folder-item lvl" + levels + `' onclick="toggleFolder(this)">`;
                html = html + "<span class='file-icon'>📁</span>";
                html = html + "<span class='file-name'>" + step + "</span>";
                html = html + "<span class='toggle-arrow'>▽</span>";
                html = html + "</div>";
                html = html + "<div class='folder-contents-with-offset'>";
                html = html + "<div class='file-subitem-buffer'></div>";

    // fariza's change: function to build and run the code of the open file in the terminal
    // john's change: python and javascript are intercepted and run via AWS Lambda
    async function launchProject() {
        const activeTab = document.querySelector(".tab.active");
        if (!activeTab) {
            alert("Please open a file to run!");
            return;
        }

        let fileName = activeTab.querySelector(".tab-name").textContent;
        const fileTypeObj = identifyType(fileName);
        const language = fileTypeObj ? fileTypeObj.language : "unknown";

        // run python and javascript through Lambda instead of the local terminal
        if (language.toLowerCase() === "python" || language.toLowerCase() === "javascript") {
            const code  = window.getEditorContent ? window.getEditorContent() : "";
            const write = window.writeToTerminal || (() => {});
            write(`\r\n\x1b[36m▶ Running ${fileName} via Lambda...\x1b[0m\r\n`);
            const btn = document.getElementById("runProjectBtn");
            if (btn) btn.disabled = true;
            try {
                const response = await fetch(Host + "/api/run-code/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-CSRFToken": getCSRFToken() },
                    body: JSON.stringify({ code, language: language.toLowerCase() })
                });
                const result = await response.json();
                if (result.stdout) write(result.stdout.replace(/\n/g, "\r\n"));
                if (result.stderr) write(`\x1b[31m${result.stderr.replace(/\n/g, "\r\n")}\x1b[0m`);
                const exitColor = result.returncode === 0 ? "\x1b[32m" : "\x1b[31m";
                write(`\r\n${exitColor}[Process exited with code ${result.returncode}]\x1b[0m\r\n`);
            } catch (err) {
                write(`\r\n\x1b[31m[Network error] ${err.message}\x1b[0m\r\n`);
            } finally {
                if (btn) btn.disabled = false;
            }
            return;
        }

        let command = "";

        switch (language.toLowerCase()) {
            case "java":
                const className = fileName.replace(".java", "");
                command = `javac ${fileName} && java ${className}\r`;
                break;
            case "c++":
            case "cpp":
                command = `g++ ${fileName} -o a.out && ./a.out\r`;
                break;
            case "c":
                command = `gcc ${fileName} -o a.out && ./a.out\r`;
                break;
            case "ruby":
                command = `ruby ${fileName}\r`;
                break;
            case "bash":
            case "shell":
                command = `bash ${fileName}\r`;
                break;
            case "go":
            case "golang":
                command = `go run ${fileName}\r`;
                break;
            case "rust":
                command = `rustc ${fileName} && ./${fileName.replace('.rs', '')}\r`;
                break;
            case "php":
                command = `php ${fileName}\r`;
                break;
            case "c#":
            case "csharp":
                command = `mcs ${fileName} && mono ${fileName.replace('.cs', '.exe')}\r`;
                break;
            default:
                command = `echo "Cannot automatically run ${fileName} (Language: ${language})."\r`;
                break;
        }

        if (_terminalSocket && _terminalSocket.readyState === WebSocket.OPEN) {
            const terminalContainer = document.querySelector(".terminal-content");
            if (terminalContainer) terminalContainer.scrollIntoView();
            _terminalSocket.send("\x03");
            setTimeout(() => {
                _terminalSocket.send(command);
            }, 100);
        } else {
            alert("Terminal is not connected.");
        }
    }

    function initializeTerminal() {
        const terminalContainer = document.querySelector(".terminal-content");
        if (!terminalContainer) return;

        const term = new Terminal({
            allowTransparency: true,
            cursorBlink: true,
            theme: {
                background: "transparent",
                foreground: "#e6ebff",
                cursor: "#5878ff",
                selection: "rgba(88,120,255,0.3)",
            },
            fontFamily: '"Consolas", "Monaco", "Courier New", monospace',
            fontSize: 13,
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(terminalContainer);
        fitAddon.fit();

        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${wsScheme}://${window.location.host}/ws/terminal/`;
        const socket = new WebSocket(wsUrl);
        _terminalSocket = socket;

        socket.onopen = () => { console.log("Terminal WebSocket connected."); };
        socket.onmessage = (event) => { term.write(event.data); };
        socket.onclose = () => { term.write("\r\n\x1b[31m[Disconnected from Terminal]\x1b[0m\r\n"); };

        window.writeToTerminal = (text) => term.write(text);

        term.onData((data) => {
            if (socket.readyState === WebSocket.OPEN) socket.send(data);
        });

        window.addEventListener("resize", () => {
            fitAddon.fit();
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }));
            }
        });
    }

    require(["vs/editor/editor.main"], function () {

        };

        window.setEditorContent = (content) => editor.setValue(content);

        // --- Collaborative editing via WebSocket ---
        let _editorFileId = null;
        let _saveTimer = null;
        let _isRemoteUpdate = false;

        window.setCurrentEditorFile = (fileId) => {
            _editorFileId = fileId;
        };

        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const editorSocket = new WebSocket(`${wsScheme}://${window.location.host}/ws/editor/`);

        editorSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "content_change" && String(data.file_id) === String(_editorFileId)) {
                _isRemoteUpdate = true;
                editor.setValue(data.content);
                _isRemoteUpdate = false;
            }
        };

        editor.onDidChangeModelContent(() => {
            if (_isRemoteUpdate || !_editorFileId) return;
            clearTimeout(_saveTimer);
            _saveTimer = setTimeout(() => {
                if (editorSocket.readyState === WebSocket.OPEN) {
                    editorSocket.send(JSON.stringify({
                        type: "content_change",
                        file_id: _editorFileId,
                        content: editor.getValue(),
                    }));
                }
            }, 2000);
        });
    });

    function getCSRFToken() {
        let csrftoken = '';
        const cookieParts = document.cookie.split(";");
        for (let i = 0; i < cookieParts.length; i++) {
            const part = cookieParts[i].trim();
            if (part.startsWith('csrftoken=')) { csrftoken = part.substring(10); break; }
        }
        return csrftoken;
    }

        closeAllModals();

    async function fetchFileContent(fileId, fileName, password = null) {
        try {
            if (openTabs.hasOwnProperty(fileId)) {
                const response = await fetch(Host + "/files/content/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-CSRFToken": getCSRFToken() },
                    body: JSON.stringify({ file_id: fileId, password: openTabs[fileId] })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    if (window.setEditorContent) {
                        window.setEditorContent(data.content);
                        const statusItem = document.querySelector(".status-left .status-item:first-child");
                        if (statusItem) statusItem.textContent = fileName;
                        language = identifyType(fileName)["language"];
                        language = language.charAt(0).toUpperCase() + language.slice(1);
                        const langItem = document.querySelector(".status-left .status-item:nth-child(2)");
                        if (langItem) langItem.textContent = language;
                        tab = document.querySelector(".tab-bar").querySelector("[data-id='" + fileId + "']");
                        if (!tab.classList.contains("active")) {
                            document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
                            tab.classList.add("active");
                        }
                    }
                } else {
                    alert("Access Denied: " + (data.error || "Incorrect password or system error."));
                }
            } else {
                const response = await fetch(Host + "/files/content/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-CSRFToken": getCSRFToken() },
                    body: JSON.stringify({ file_id: fileId, password: password })
                });

            const data = await response.json();
            if (response.ok && data.success) {
                if (window.setCurrentEditorFile) window.setCurrentEditorFile(fileId);
                if (window.setEditorContent) {
                    window.setEditorContent(data.content);
                    const statusItem = document.querySelector(".status-left .status-item:first-child");
                    if (statusItem) statusItem.textContent = fileName;
                    language = identifyType(fileName)["language"]
                    language = language.charAt(0).toUpperCase() + language.slice(1);
                    const langItem = document.querySelector(".status-left .status-item:nth-child(2)");
                    if (langItem) langItem.textContent = language
                    generateTabHTML(fileId, fileName);
                }
            } else {
                alert("Access Denied: " + (data.error || "Incorrect password or system error."));
            }
            }
        } catch (err) {
            console.error("File loading error:", err);
            alert("Error: Could not reach the server to open the file.");
        }
    }
