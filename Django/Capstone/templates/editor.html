{% load static %}

<!doctype html>
<html>
  <head>
    <title>CoCodingStudio | editor</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />

    <!-- xterm.js dependencies -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
  </head>

  <body>
    <!-- Top Bar (removed activity-bar class so it no longer gets hidden) -->
    <div class="top-bar">
      <div class="top-bar-left">
        <h3>Project:</h3>
        <h3 id="projectName"></h3>
      </div>
      <button id="settingsBtn" class="settings-button" title="Project Settings">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
      <div class="settings-modal">
        <div class="modal-header">
          <h2>Project Settings</h2>
          <button id="closeSettingsBtn" class="close-button">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-content">
          <div class="settings-section">
            <label class="settings-label">Project Name</label>
            <input
              type="text"
              id="projectNameInput"
              class="settings-input"
              placeholder="Enter project name"
            />
          </div>
          <div class="settings-section">
            <label class="settings-label">Description</label>
            <textarea
              id="projectDescInput"
              class="settings-input"
              placeholder="Enter project description"
              rows="4"
            ></textarea>
          </div>
          <div class="settings-section">
            <label class="settings-label">Visibility</label>
            <select id="projectVisibility" class="settings-input">
              <option value="private">Private</option>
              <option value="public">Public</option>
              <option value="shared">Shared</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button id="savSettingsBtn" class="btn-primary">Save Changes</button>
          <button id="cancelSettingsBtn" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="editor-layout">
      <!-- Sidebar with Files -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h4>Files</h4>
        </div>
        <div class="sidebar-content">
          <div id="file-tree"></div>
        </div>
      </div>

      <!-- Vertical Divider -->
      <div class="divider vertical" id="verticalDivider"></div>

      <!-- Editor Area -->
      <div class="editor-main" id="editorMain">
        <!-- Tab Bar -->
        <div class="tab-bar">
          <div class="tab active">
            <span class="tab-name">main.py</span>
            <button class="tab-close">×</button>
          </div>
          <div class="tab">
            <span class="tab-name">utils.py</span>
            <button class="tab-close">×</button>
          </div>
        </div>

        <!-- Content Area -->
        <div id="workspace">
          <div class="openFiles" id="editorContent"></div>
          <!-- Horizontal Divider -->
          <div class="divider horizontal" id="horizontalDivider"></div>
          <div class="terminal-panel" id="terminalPanel">
            <div class="terminal-header">
              <div class="terminal-tab">Command Terminal</div>
              <button
                id="killTerminalBtn"
                title="Kill Terminal"
                onclick="killTerminal()"
                style="
                  background: none;
                  border: none;
                  cursor: pointer;
                  margin-left: auto;
                  padding: 4px 6px;
                  color: #cccccc;
                  display: flex;
                  align-items: center;
                  border-radius: 4px;
                  transition: background 0.15s, color 0.15s;
                "
                onmouseover="this.style.background='rgba(229,83,75,0.15)';this.style.color='#e5534b';"
                onmouseout="this.style.background='none';this.style.color='#cccccc';"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                  <path d="M10 11v6"></path>
                  <path d="M14 11v6"></path>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                </svg>
              </button>
            </div>
            <div class="terminal-content"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-item">main.py</span>
        <span class="status-item">Python</span>
      </div>
      <div class="status-right">
        <span class="status-item">Ln 1, Col 1</span>
        <span class="status-item">UTF-8</span>
      </div>
    </div>

  </body>
  <script>
    const Host = "http://127.0.0.1:8000";

    async function getProjectName() {
      const storedProjectName = sessionStorage.getItem("currentProjectName");
      const projNameSpot = document.getElementById("projectName");
      if (storedProjectName && projNameSpot) {
        projNameSpot.innerHTML = storedProjectName;
      } else {
        try {
          const URL = Host + "/api/getProjName";
          const result = await fetch(URL);
          const data = await result.json();
          if (data && data.name && projNameSpot) {
            projNameSpot.innerHTML = data.name;
          }
        } catch (err) {
          console.error("Error fetching project name:", err);
        }
      }
    }
    getProjectName();

    async function getFileDirectories() {
      const URL = Host + "/files/get/";
      const result = await fetch(URL);
      result.json().then((data) => {
        var files = data.files;
        var sorted = sortDirectories(files);
        console.log(sorted);
        populateFileTree(sorted["/"]);
      });
    }
    getFileDirectories();

    function sortDirectories(files) {
      topLevel = { "/": {} };
      for (var i = 0; i < files.length; i++) {
        var file = files[i];
        var relPath = file.name;
        var prevLevels = [];
        var at = "/";
        var bottomFolder = topLevel[at];
        while (relPath.includes("/")) {
          var before = relPath.substr(0, relPath.indexOf("/"));
          var curFolder = topLevel;
          for (var j = 0; j < prevLevels.length; j++) {
            curFolder = curFolder[prevLevels[j]];
          }
          curFolder = curFolder[at];
          if (Object.hasOwn(curFolder, before) == false) {
            curFolder[before] = {};
          }
          curFolder = curFolder[before];
          prevLevels.push(at);
          at = before;
          relPath = relPath.substr(relPath.indexOf("/") + 1);
          bottomFolder = curFolder;
        }
        bottomFolder[relPath] = "file";
      }
      return topLevel;
    }

    function generateFileTreeHTML(files, levels = 0) {
        html = "";
        for (step in files) {
            // start a file-item tag
            html = html + "<div class='file-item'>";
            // put the correct number of buffers in it
            for (var i = 0; i < levels; i += 1) {
                html = html + "<div class='file-subitem-buffer'></div>"
            }
            // determine if it is a folder or a file
            if (typeof files[step] === "string" || files[step] instanceof String) {
                // for now, just set the icon to blank page, later will add function to
                // determine file type
                html = html + "<span class='file-icon' >📄</span>";
                html = html + "<span class='file-name' >" + step + "</span>";
                html = html + "</div>"
            } else {
                html = html + "<span class='file-icon'>📁</span >"
                html = html + "<span class='file-name' >" + step + "</span>";
                html = html + "</div>";
                html = html + generateFileTreeHTML(files[step], levels + 1);
            }
        }
        return html
    }

    function populateFileTree(files){
        html = generateFileTreeHTML(files);
        tree = document.getElementById("file-tree");
        tree.innerHTML = html
    }

    let _terminalSocket = null;
    function killTerminal() {
      if (_terminalSocket && _terminalSocket.readyState === WebSocket.OPEN) {
        _terminalSocket.send(JSON.stringify({ type: "kill" }));
      }
    }

    function initializeTerminal() {
      const terminalContainer = document.querySelector(".terminal-content");
      if (!terminalContainer) return;

      const term = new Terminal({
        cursorBlink: true,
        theme: {
          background: "#0d1530",
          foreground: "#e6ebff",
          cursor: "#5878ff",
          selection: "rgba(88,120,255,0.3)",
        },
        fontFamily: '"Consolas", "Monaco", "Courier New", monospace',
        fontSize: 13,
      });

      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(terminalContainer);
      fitAddon.fit();

      const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
      const wsUrl = `${wsScheme}://${window.location.host}/ws/terminal/`;
      const socket = new WebSocket(wsUrl);
      _terminalSocket = socket;

      socket.onopen = () => {
        console.log("Terminal WebSocket connected.");
      };

      socket.onmessage = (event) => {
        term.write(event.data);
      };

      socket.onclose = () => {
        term.write("\r\n\x1b[31m[Disconnected from Terminal]\x1b[0m\r\n");
      };

      term.onData((data) => {
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(data);
        }
      });

      window.addEventListener("resize", () => {
        fitAddon.fit();
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(
            JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows })
          );
        }
      });
    }

    initializeTerminal();

    document.querySelectorAll(".file-item").forEach((item) => {
      item.addEventListener("click", function () {
        document.querySelectorAll(".file-item").forEach((f) => f.classList.remove("active"));
        this.classList.add("active");
        const fileName = this.querySelector(".file-name").textContent;
        console.log("Clicked file:", fileName);
      });
    });

    document.querySelectorAll(".tab-close").forEach((closeBtn) => {
      closeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        this.closest(".tab").remove();
      });
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", function () {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        this.classList.add("active");
      });
    });

    /* ============================
       Settings Modal
    ============================ */
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsModal = document.getElementById("settingsModal");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");
    const cancelSettingsBtn = document.getElementById("cancelSettingsBtn");
    const saveSettingsBtn = document.getElementById("savSettingsBtn");
    const projectNameInput = document.getElementById("projectNameInput");

    settingsBtn.addEventListener("click", () => {
      const projectName = document.getElementById("projectName").textContent;
      projectNameInput.value = projectName;
      settingsModal.classList.add("active");
    });

    const closeModal = () => {
      settingsModal.classList.remove("active");
    };

    closeSettingsBtn.addEventListener("click", closeModal);
    cancelSettingsBtn.addEventListener("click", closeModal);

    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) closeModal();
    });

    saveSettingsBtn.addEventListener("click", () => {
      const newProjectName = projectNameInput.value.trim();
      if (newProjectName) {
        document.getElementById("projectName").textContent = newProjectName;
        sessionStorage.setItem("currentProjectName", newProjectName);
      }
      closeModal();
    });

    /* ============================
       Resizable Panels
    ============================ */
    let isResizing = false;
    let currentDivider = null;
    let startX = 0;
    let startY = 0;
    let startSidebarWidth = 0;
    let startTerminalHeight = 0;

    const verticalDivider = document.getElementById("verticalDivider");
    const horizontalDivider = document.getElementById("horizontalDivider");

    if (verticalDivider) {
      verticalDivider.addEventListener("mousedown", (e) => {
        isResizing = true;
        currentDivider = "vertical";
        startX = e.clientX;
        startSidebarWidth = document.getElementById("sidebar").offsetWidth;
        verticalDivider.classList.add("active");
        document.body.style.userSelect = "none";
        document.body.style.cursor = "col-resize";
        e.preventDefault();
      });
    }

    if (horizontalDivider) {
      horizontalDivider.addEventListener("mousedown", (e) => {
        isResizing = true;
        currentDivider = "horizontal";
        startY = e.clientY;
        startTerminalHeight = document.getElementById("terminalPanel").offsetHeight;
        horizontalDivider.classList.add("active");
        document.body.style.userSelect = "none";
        document.body.style.cursor = "row-resize";
        e.preventDefault();
      });
    }

    document.addEventListener("mousemove", (e) => {
      if (!isResizing) return;

      const root = document.documentElement;
      const sidebar = document.getElementById("sidebar");
      const terminalPanel = document.getElementById("terminalPanel");
      const editorLayout = document.querySelector(".editor-layout");
      const workspace = document.getElementById("workspace");

      if (currentDivider === "vertical" && sidebar) {
        const delta = e.clientX - startX;
        const newWidth = startSidebarWidth + delta;
        const minWidth = 150;
        const maxWidth = editorLayout.offsetWidth - 300;
        if (newWidth >= minWidth && newWidth <= maxWidth) {
          root.style.setProperty("--sidebar-width", newWidth + "px");
        }
      } else if (currentDivider === "horizontal" && terminalPanel && workspace) {
        const delta = startY - e.clientY;
        const newHeight = startTerminalHeight + delta;
        const minHeight = 80;
        const maxHeight = workspace.offsetHeight - 80;
        if (newHeight >= minHeight && newHeight <= maxHeight) {
          root.style.setProperty("--terminal-height", newHeight + "px");
        }
      }
    });

    document.addEventListener("mouseup", () => {
      if (!isResizing) return;
      isResizing = false;
      if (verticalDivider) verticalDivider.classList.remove("active");
      if (horizontalDivider) horizontalDivider.classList.remove("active");
      document.body.style.userSelect = "auto";
      document.body.style.cursor = "auto";
      currentDivider = null;
    });
  </script>
</html>
