{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>CoCodingStudio | editor</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    
    <!-- xterm.js dependencies -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@4.19.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@4.19.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.5.0/lib/xterm-addon-fit.js"></script>
</head>

<body>
    <div class="top-bar activity-bar">
        <h3>Project: </h3>
        <h3 id="projectName"></h3>
    </div>
    <div class="notTheTopBar">
        <div class="sidebar fileDirectoryBar">
            <div class="top-bar activity-bar">
                <h3>Commit: </h3>
                <h3 id="commitName"></h3>
            </div>
        </div>
        <div class="editor-content">
            <div id="tabHeaders" class="top-bar"></div>
            <div id="workspace">
                <div class="openFiles"></div>
                <div class="terminal-panel">
                    <div class="terminal-header">
                        <div class="terminal-tab">Command Terminal</div>
                        <button id="killTerminalBtn" title="Kill Terminal" onclick="killTerminal()" style="background:none;border:none;cursor:pointer;margin-left:auto;padding:4px 6px;color:#cccccc;display:flex;align-items:center;border-radius:4px;transition:background 0.15s,color 0.15s;" onmouseover="this.style.background='rgba(229,83,75,0.15)';this.style.color='#e5534b'" onmouseout="this.style.background='none';this.style.color='#cccccc'">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="terminal-content"></div>
                </div>
            </div>
        </div>
    </div>
    
    

</body>
<script>
    // API Calls to the backend:------------
    const Host = "http://127.0.0.1:8000"

    // gets the name of the current project
    async function getProjectName() {
        const URL = Host + "/api/getProjName"
        const result = await fetch(URL)
        result.json().then(data => {
            const name = data.name
            var projNameSpot = document.getElementById("projectName")
            projNameSpot.innerHTML = name
        })
    }
    getProjectName()

    // gets the name of the current commit
    async function getCommitName(){
        const URL = Host + "/api/getComName"
        const result = await fetch(URL)
        result.json().then(data => {
            const name = data.name
            var comNameSpot = document.getElementById("commitName")
            comNameSpot.innerHTML = name
        })
    }
    getCommitName()

    // gets the directories of all of the files in the current commit
    async function getFileDirectories() {
        const URL = Host + "/files/get/"
        const result = await fetch(URL)
        result.json().then(data => {
            var files = data.files
            console.log(files)
            var sorted = sortDirectories(files)
            console.log(sorted)
        })

    }
    getFileDirectories()

    // sorts the files into directories
    function sortDirectories(files) {
        topLevel = {"/": {}}
        for (var i = 0; i < files.length; i++) {
            var file = files[i]
            var relPath = file.name
            var prevLevels = []
            var at = "/"
            var bottomFolder = topLevel[at]
            while (relPath.includes("/")) {
                var before = relPath.substr(0, relPath.indexOf("/"))
                var curFolder = topLevel
                for (var j = 0; j < prevLevels.length; j++) {
                    curFolder = curFolder[prevLevels[j]]
                }
                curFolder = curFolder[at]
                if (Object.hasOwn(curFolder, before) == false) {
                    curFolder[before] = {}
                }
                curFolder = curFolder[before]
                prevLevels.push(at)
                at = before
                relPath = relPath.substr(relPath.indexOf("/") + 1)
                bottomFolder = curFolder
            }
            bottomFolder[relPath] = "file"
        }
        return topLevel
    }

    // Kill/restart the terminal session
    let _terminalSocket = null;
    function killTerminal() {
        if (_terminalSocket && _terminalSocket.readyState === WebSocket.OPEN) {
            _terminalSocket.send(JSON.stringify({ 'type': 'kill' }));
        }
    }

    // Terminal Setup using xterm.js and WebSocket
    function initializeTerminal() {
        const terminalContainer = document.querySelector('.terminal-content');
        if (!terminalContainer) return;

        // Initialize xterm.js
        const term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#1e1e1e',
                foreground: '#cccccc'
            }
        });

        // Initialize fit addon
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        // Open terminal in the container
        term.open(terminalContainer);
        fitAddon.fit();

        // Connect WebSocket to Django backend
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${wsScheme}://${window.location.host}/ws/terminal/`;
        const socket = new WebSocket(wsUrl);
        _terminalSocket = socket;  // expose for killTerminal()

        socket.onopen = () => {
            console.log("Terminal WebSocket connected.");
        };

        socket.onmessage = (event) => {
            // Write output from the backend to the terminal
            term.write(event.data);
        };

        socket.onclose = () => {
            term.write('\r\n\x1b[31m[Disconnected from Terminal]\x1b[0m\r\n');
        };

        // Send frontend keystrokes to the backend websocket
        term.onData((data) => {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(data);
            }
        });

        // Handle terminal resizing
        window.addEventListener('resize', () => {
            fitAddon.fit();
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    'type': 'resize',
                    'cols': term.cols,
                    'rows': term.rows
                }));
            }
        });
    }

    // Initialize the terminal when the script runs
    initializeTerminal();

</script>

</html>
