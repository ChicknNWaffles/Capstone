{% load static %}

<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>

<body class="page page-auth">
  <main class="wrap">
    <section class="auth-card">
      <h1 class="title">Welcome Back</h1>
      <p class="sub">Log in to your account</p>

      <form class="form" onsubmit="return false;">
        {% csrf_token %} <!-- CSRF token for security -->
        <label class="field">
          <input class="input" type="text" id="username" placeholder="Username" autocomplete="username" />
        </label>

        <label class="field">
          <input class="input" type="password" id="password" placeholder="Password" autocomplete="current-password" />
        </label>

        <button class="auth-btn" type="button" id="loginBtn">
          Sign In
        </button>

        <p class="foot">
          Don’t have an account?
          <a class="link strong" href="/signup/">Sign up</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Fill in all fields");
        return;
      }

      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value; // get csrftoken

      try {
        const response = await fetch("/api/login/", { // connecting to backend
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken // send csrftoken
          },
          body: JSON.stringify({ username, password }),
          credentials: "include"
        });

        if (response.ok) {
          window.location.href = "/";
        } else {
          const text = await response.text(); // get the error message from backend
          console.error("Login failed:", response.status, text); // log error to console for debugging
          alert(`Login failed (${response.status}): ${text}`); // show specific error to user
        }
      } catch (err) {
        alert("Backend not running");
        console.error(err);
      }
    });
  </script>
</body>

</html>

<!-- END -->
