<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoCoding Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }

      :root {
        --glass-bg: rgba(18, 25, 55, 0.3);
        --glass-border: rgba(255, 255, 255, 0.07);
        --glass-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        --glass-inner: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        --glass-blur: blur(20px) saturate(140%);
        --accent: #5878ff;
        --text-primary: rgba(230, 235, 255, 0.88);
        --text-muted: rgba(230, 235, 255, 0.4);
        --border: rgba(255, 255, 255, 0.07);
      }

      body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        background:
          radial-gradient(1000px 500px at 10% 5%, rgba(88, 120, 255, 0.18), transparent 60%),
          radial-gradient(800px 500px at 85% 25%, rgba(168, 85, 247, 0.14), transparent 55%),
          linear-gradient(180deg, #0b1224, #060914);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Nav ── */
      .top-nav {
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 16, 34, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        position: sticky;
        top: 0;
        z-index: 100;
        flex-shrink: 0;
      }

      .nav-brand {
        font-size: 0.85rem;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.75);
      }

      .user-profile { position: relative; }

      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(88, 120, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: rgba(255,255,255,0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.65rem;
        cursor: pointer;
        user-select: none;
        transition: all 0.15s;
      }

      .avatar:hover { background: rgba(88, 120, 255, 0.32); }

      .dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: 148px;
        background: #0c1428;
        border: 1px solid var(--border);
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        border-radius: 8px;
        padding: 4px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-5px);
        transition: all 0.15s cubic-bezier(0.16,1,0.3,1);
      }

      .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }

      .menu-item {
        display: block;
        padding: 7px 10px;
        color: rgba(255,255,255,0.6);
        font-size: 0.78rem;
        border-radius: 5px;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font-family: inherit;
        transition: background 0.12s, color 0.12s;
      }

      .menu-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
      .menu-item.danger { color: rgba(255,100,100,0.8); }
      .menu-item.danger:hover { background: rgba(255,100,100,0.08); color: #ff6b6b; }

      /* ── Page ── */
      .home {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 2rem;
      }

      .page-body {
        width: 100%;
        max-width: 680px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.75rem;
      }

      /* ── Welcome ── */
      .welcome {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }

      .welcome-title {
        font-size: 1.4rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.95);
        letter-spacing: -0.01em;
      }

      .welcome-sub {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      /* ── Search ── */
      .search-wrap {
        position: relative;
        width: 100%;
        max-width: 420px;
      }

      .search-input {
        width: 100%;
        padding: 10px 16px 10px 36px;
        border-radius: 8px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 0.83rem;
        outline: none;
        transition: all 0.2s;
      }

      .search-input::placeholder { color: var(--text-muted); }

      .search-input:focus {
        background: rgba(255,255,255,0.07);
        border-color: rgba(88,120,255,0.35);
        box-shadow: 0 0 0 3px rgba(88,120,255,0.08);
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
        display: flex;
      }

      /* ── Grid ── */
      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 10px;
        width: 100%;
      }

      /* Skeleton */
      .skeleton-card {
        height: 78px;
        border-radius: 8px;
        background: rgba(255,255,255,0.025);
        border: 1px solid var(--border);
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50%       { opacity: 0.55; }
      }

      /* Empty state */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        padding: 3rem 0 1rem;
        text-align: center;
        grid-column: 1/-1;
      }

      .empty-icon {
        width: 38px;
        height: 38px;
        border: 1px dashed rgba(255,255,255,0.1);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255,255,255,0.16);
        font-size: 1rem;
        margin-bottom: 2px;
      }

      .empty-label {
        font-size: 0.78rem;
        color: rgba(230,235,255,0.32);
      }

      .btn-create-first {
        margin-top: 6px;
        padding: 8px 20px;
        font-size: 0.8rem;
        font-weight: 600;
        background: rgba(88,120,255,0.15);
        border: 1px solid rgba(88,120,255,0.28);
        color: rgba(255,255,255,0.75);
        border-radius: 7px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }

      .btn-create-first:hover {
        background: rgba(88,120,255,0.25);
        color: white;
        transform: translateY(-1px);
      }

      /* No results */
      .no-results {
        grid-column: 1/-1;
        text-align: center;
        padding: 2.5rem 0;
        color: var(--text-muted);
        font-size: 0.78rem;
      }

      /* ── Card ── */
      .card {
        position: relative;
        padding: 13px 14px 11px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-radius: 8px;
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--border);
        box-shadow: var(--glass-shadow), var(--glass-inner);
        cursor: pointer;
        transition: transform 0.15s, border-color 0.15s, background 0.15s;
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(255,255,255,0.12);
        background: rgba(22, 32, 68, 0.5);
      }

      .card-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.4rem;
      }

      .card-name {
        font-size: 1rem;
        font-weight: 500;
        color: rgba(255,255,255,0.9);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .card-menu-wrap { position: relative; flex-shrink: 0; }

      .btn-card-menu {
        background: none;
        border: none;
        color: rgba(255,255,255,0.2);
        font-size: 0.9rem;
        cursor: pointer;
        padding: 2px 5px;
        border-radius: 4px;
        line-height: 1;
        transition: color 0.12s, background 0.12s;
      }

      .btn-card-menu:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

      /* ── Portal dropdown — appended to body, positioned with fixed ── */
      .card-dropdown-portal {
        position: fixed;
        background: #0c1428;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 3px;
        min-width: 105px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        z-index: 9999;
        animation: dropIn 0.12s cubic-bezier(0.16,1,0.3,1);
      }

      @keyframes dropIn {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .card-action {
        display: block;
        width: 100%;
        text-align: left;
        padding: 6px 10px;
        background: none;
        border: none;
        color: rgba(255,255,255,0.65);
        font-size: 0.75rem;
        cursor: pointer;
        border-radius: 4px;
        font-family: inherit;
        transition: background 0.12s, color 0.12s;
      }

      .card-action:hover { background: rgba(255,255,255,0.06); color: white; }
      .card-action.danger { color: rgba(255,100,100,0.8); }
      .card-action.danger:hover { background: rgba(255,100,100,0.08); color: #ff6b6b; }

      .card-meta { display: flex; align-items: center; justify-content: space-between; }
      .card-date { font-size: 0.68rem; color: var(--text-muted); }

      .card-badge {
        font-size: 0.6rem;
        padding: 1px 7px;
        border-radius: 99px;
        border: 1px solid var(--border);
        color: var(--text-muted);
        background: rgba(255,255,255,0.03);
        text-transform: capitalize;
        letter-spacing: 0.02em;
      }

      .card-badge.public {
        color: rgba(74,210,120,0.75);
        border-color: rgba(74,210,120,0.18);
        background: rgba(74,210,120,0.05);
      }

      /* ── New project button ── */
      .btn-new-float {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 9px 18px;
        font-size: 0.8rem;
        font-weight: 600;
        background: rgba(88,120,255,0.2);
        border: 1px solid rgba(88,120,255,0.35);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
        backdrop-filter: blur(10px);
        display: none;
      }

      .btn-new-float:hover {
        background: rgba(88,120,255,0.32);
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(88,120,255,0.25);
      }

      .btn-new-float.visible { display: block; }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(5px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.18s, visibility 0.18s;
      }

      .modal-overlay.active { opacity: 1; visibility: visible; }

      .modal-box {
        width: min(290px, 92%);
        background: #0c1428;
        border: 1px solid var(--border);
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        border-radius: 10px;
        padding: 20px 18px 16px;
        transform: translateY(8px);
        transition: transform 0.18s;
      }

      .modal-overlay.active .modal-box { transform: translateY(0); }

      .modal-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: rgba(255,255,255,0.88);
        margin-bottom: 1.2rem;
      }

      .field { margin-bottom: 13px; }

      .field-label {
        display: block;
        font-size: 0.63rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.09em;
        margin-bottom: 5px;
      }

      .field-input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.12);
        padding: 6px 0;
        color: var(--text-primary);
        font-size: 0.82rem;
        outline: none;
        font-family: inherit;
        transition: border-color 0.15s;
        border-radius: 0;
      }

      .field-input:focus { border-bottom-color: var(--accent); }
      .field-input::placeholder { color: var(--text-muted); }
      select.field-input { appearance: none; cursor: pointer; }
      select.field-input option { background: #0c1428; color: white; }

      .modal-footer {
        margin-top: 16px;
        display: flex;
        gap: 7px;
        justify-content: flex-end;
      }

      .btn-confirm {
        padding: 6px 14px;
        border-radius: 5px;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.78rem;
        transition: background 0.15s;
      }

      .btn-confirm:hover { background: #4a67e0; }

      .btn-dismiss {
        padding: 6px 11px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 5px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.78rem;
        transition: all 0.12s;
      }

      .btn-dismiss:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.16); }

      @media (max-width: 520px) {
        .projects-grid { grid-template-columns: 1fr; }
        .home { padding: 2rem 1rem; }
      }
    </style>
  </head>

  <body>

    <!-- Nav -->
    <nav class="top-nav">
      <span class="nav-brand">CoCoding Studio</span>
      <div class="user-profile">
        <div class="avatar" id="userAvatar">ME</div>
        <div class="dropdown-menu" id="userDropdown">
          <button class="menu-item">Settings</button>
          <button class="menu-item danger" id="logoutBtn">Log Out</button>
        </div>
      </div>
    </nav>

    <!-- Page -->
    <main class="home">
      <div class="page-body">

        <!-- Welcome -->
        <div class="welcome">
          <div class="welcome-title" id="welcomeTitle">Good evening!</div>
          <div class="welcome-sub">What are you working on today?</div>
        </div>

        <!-- Search -->
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input type="text" id="projectSearch" class="search-input" placeholder="Search projects..." />
        </div>

        <!-- Grid -->
        <div class="projects-grid" id="projectsGrid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>

      </div>
    </main>

    <!-- Floating New button -->
    <button class="btn-new-float" id="btnNewFloat">+ New Project</button>

    <!-- Modal -->
    <div class="modal-overlay" id="createModal">
      <div class="modal-box">
        <h2 class="modal-title">New project</h2>
        <form id="createProjectForm">
          <div class="field">
            <label class="field-label" for="projectName">Name</label>
            <input type="text" id="projectName" class="field-input"
              placeholder="e.g. my-app" required autocomplete="off" />
          </div>
          <div class="field">
            <label class="field-label" for="projectVisibility">Visibility</label>
            <select id="projectVisibility" class="field-input">
              <option value="private">Private</option>
              <option value="public">Public</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn-dismiss" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn-confirm">Create</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const Host = "";
      const projects = [];

      const grid        = document.getElementById("projectsGrid");
      const searchInput = document.getElementById("projectSearch");
      const btnFloat    = document.getElementById("btnNewFloat");

      // ── Portal dropdown state ──
      let activePortalDrop = null;

      function closePortalDropdown() {
        if (activePortalDrop) {
          activePortalDrop.remove();
          activePortalDrop = null;
        }
      }

      function openPortalDropdown(btn, project) {
        // Close any existing one first
        closePortalDropdown();

        const rect = btn.getBoundingClientRect();

        const drop = document.createElement("div");
        drop.className = "card-dropdown-portal";

        // Position: below the button, right-aligned to it
        drop.style.top  = `${rect.bottom + 4}px`;
        drop.style.left = `${rect.right - 105}px`;

        drop.innerHTML = `
          <button class="card-action" data-action="rename">Rename</button>
          <button class="card-action danger" data-action="delete">Delete</button>
        `;

        drop.querySelector("[data-action='delete']").addEventListener("click", async e => {
          e.stopPropagation();
          closePortalDropdown();
          if (!confirm(`Delete project "${project.name}"? This cannot be undone.`)) return;
          const csrf = getCookie("csrftoken");
          try {
            const res = await fetch(`/project/${project.id}/delete/`, {
              method: "DELETE",
              headers: { "X-CSRFToken": csrf },
              credentials: "include",
            });
            if (res.ok) {
              const idx = projects.findIndex(x => x.id === project.id);
              if (idx !== -1) projects.splice(idx, 1);
              render(searchInput.value);
            } else {
              alert("Could not delete project.");
            }
          } catch (err) {
            alert("Server error.");
            console.error(err);
          }
        });

        drop.querySelector("[data-action='rename']").addEventListener("click", e => {
          e.stopPropagation();
          closePortalDropdown();
          // Rename logic can go here
        });

        // Prevent clicks inside from bubbling to document (which would close it)
        drop.addEventListener("click", e => e.stopPropagation());

        document.body.appendChild(drop);
        activePortalDrop = drop;
      }

      /* Welcome + avatar */
      (async function initGreeting() {
        let name = "";
        try {
          const res  = await fetch("/api/me/", { credentials: "include" });
          const data = await res.json();
          if (data.authenticated) name = data.username || "";
        } catch (e) {}

        const first = name.split(" ")[0];
        const h = new Date().getHours();
        const time = h < 12 ? "morning" : h < 18 ? "afternoon" : "evening";
        const greeting = first ? `Good ${time}, ${first}!` : `Good ${time}!`;
        document.getElementById("welcomeTitle").textContent = greeting;
        const initials = name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) || "ME";
        document.getElementById("userAvatar").textContent = initials;
        sessionStorage.setItem("currentUserName", name);
      })();

      /* Fetch */
      async function loadProjects() {
        try {
          const res  = await fetch(Host + "/project/getUserProjects");
          const data = await res.json();

          for (const proj of data.projects) {
            const days = Math.floor(Math.abs(Date.now() - Date.parse(proj.last_edited)) / 86400000);
            const since =
              days === 0 ? "today" :
              days === 1 ? "1 day ago" :
              days < 7   ? `${days} days ago` :
              days < 14  ? "1 week ago" :
              days < 365 ? `${Math.floor(days / 7)} weeks ago` :
              days < 730 ? "1 year ago" :
                           `${Math.floor(days / 365)} years ago`;

            projects.push({
              id: proj.id,
              name: proj.name,
              lastEdited: `Edited ${since}`,
              visibility: proj.visibility || "private",
            });
          }
        } catch (e) {
          console.error(e);
        } finally {
          render();
        }
      }
      loadProjects();

      /* Render */
      function render(filter = "") {
        const filtered = projects.filter(p =>
          p.name.toLowerCase().includes(filter.toLowerCase())
        );

        grid.innerHTML = "";
        btnFloat.classList.toggle("visible", projects.length > 0);

        if (projects.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">+</div>
              <p class="empty-label">No projects yet</p>
              <button class="btn-create-first" id="btnCreateFirst">Create your first project</button>
            </div>`;
          document.getElementById("btnCreateFirst").addEventListener("click", openModal);
          return;
        }

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="no-results">No results for "<strong>${filter}</strong>"</div>`;
          return;
        }

        filtered.forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-row">
              <span class="card-name">${p.name}</span>
              <div class="card-menu-wrap">
                <button class="btn-card-menu">⋮</button>
              </div>
            </div>
            <div class="card-meta">
              <span class="card-date">${p.lastEdited}</span>
              <span class="card-badge ${p.visibility}">${p.visibility}</span>
            </div>`;

          // ── Open portal dropdown on ⋮ click ──
          card.querySelector(".btn-card-menu").addEventListener("click", e => {
            e.stopPropagation();
            openPortalDropdown(e.currentTarget, p);
          });

          card.addEventListener("click", e => {
            if (!e.target.closest(".card-menu-wrap")) redirect(p.id);
          });

          grid.appendChild(card);
        });
      }

      searchInput.addEventListener("input", e => render(e.target.value));

      /* Close portal dropdown when clicking anywhere else */
      document.addEventListener("click", () => {
        closePortalDropdown();
        document.getElementById("userDropdown").classList.remove("active");
      });

      /* CSRF */
      function getCookie(name) {
        for (const c of document.cookie.split(";")) {
          const t = c.trim();
          if (t.startsWith(name + "=")) return decodeURIComponent(t.slice(name.length + 1));
        }
        return null;
      }

      /* Redirect */
      async function redirect(id) {
        const csrf = getCookie("csrftoken");
        try {
          const r1 = await fetch(Host + "/api/setCurProj/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": csrf },
            body: JSON.stringify({ project: id }), credentials: "include",
          });
          if (!r1.ok) { alert((await r1.json()).error || "Error"); return; }

          const r2 = await fetch(Host + "/api/setCurBranch/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": csrf },
            body: JSON.stringify({ com: "" }), credentials: "include",
          });
          if (!r2.ok) { alert((await r2.json()).error || "Error"); return; }

          const p = projects.find(p => p.id === id);
          if (p) {
            sessionStorage.setItem("currentProjectName", p.name);
            sessionStorage.setItem("currentProjectId", p.id);
          }
          window.location.href = "/editor/";
        } catch (e) {
          alert("Something went wrong. The project may have been created — please refresh the page.");
          console.error(e);
        }
      }

      /* Nav dropdown */
      const avatar   = document.getElementById("userAvatar");
      const dropdown = document.getElementById("userDropdown");
      avatar.addEventListener("click", e => { e.stopPropagation(); dropdown.classList.toggle("active"); });
      document.getElementById("logoutBtn").addEventListener("click", () => { window.location.href = "/login/"; });

      /* Modal */
      const modal = document.getElementById("createModal");
      const form  = document.getElementById("createProjectForm");

      function openModal() {
        modal.classList.add("active");
        document.getElementById("projectName").focus();
      }

      btnFloat.addEventListener("click", openModal);

      function closeModal() { modal.classList.remove("active"); form.reset(); }
      document.getElementById("cancelBtn").addEventListener("click", closeModal);
      modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });

      form.addEventListener("submit", async e => {
        e.preventDefault();
        const name       = document.getElementById("projectName").value.trim();
        const visibility = document.getElementById("projectVisibility").value;
        if (!name) return;

        try {
          const csrf = getCookie("csrftoken");
          const res  = await fetch(Host + "/project/createProject/", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": csrf },
            body: JSON.stringify({ name, visibility }),
            credentials: "include",
          });
          if (res.ok) {
            const data = await res.json();
            sessionStorage.setItem("currentProjectName", name);
            sessionStorage.setItem("currentProjectId", data.id);
            await redirect(data.id);
          } else {
            alert((await res.json()).error || "Failed");
          }
        } catch (e) {
          alert("Something went wrong. The project may have been created — please refresh the page.");
          console.error(e);
        }
      });
    </script>
  </body>
</html>
