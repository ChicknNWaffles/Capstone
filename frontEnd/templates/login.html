<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="../static/style.css" />
</head>

<body class="page">
  <main class="wrap">
    <section class="card">
      <h1 class="title">Welcome Back</h1>
      <p class="sub">Sign in to your account</p>

      <form class="form">
        <label class="field">
          <input class="input" type="email" placeholder="Email Address" autocomplete="email" />
        </label>

        <label class="field">
          <input class="input" type="password" placeholder="Password" autocomplete="current-password" />
        </label>

        <div class="row">
          <label class="check">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a class="link" href="#">Forgot password?</a>
        </div>

        <button class="btn" type="button">Sign In</button>

        <!-- Social(Google and GitHub) login disabled for now -->
        <!--
        <div class="divider"><span>or continue with</span></div>

        <div class="social">
          <button class="social-btn" type="button">Google</button>
          <button class="social-btn" type="button">GitHub</button>
        </div>
        -->

        <p class="foot">
          Don’t have an account? <a class="link strong" href="http://127.0.0.1:5000/signup">Sign up</a>
        </p>
      </form>
    </section>
  </main>
</body>
</html>
