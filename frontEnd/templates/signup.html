<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up</title>
  <link rel="stylesheet" href="../static/style.css" />
</head>

<body class="page">
  <main class="wrap">
    <section class="card">
      <h1 class="title">Create Account</h1>
      <p class="sub">Sign up to get started</p>

      <form class="form">
        <label class="field">
          <input
            class="input"
            type="email"
            placeholder="Email Address"
            autocomplete="email"
          />
        </label>

        <label class="field">
          <input
            class="input"
            type="password"
            placeholder="Password"
            autocomplete="new-password"
          />
        </label>

        <label class="field">
          <input
            class="input"
            type="password"
            placeholder="Confirm Password"
            autocomplete="new-password"
          />
        </label>

        <button class="btn" type="button">Sign Up</button>

        <p class="foot">
          Already have an account?
          <a class="link strong" href="http://127.0.0.1:5000/login">Log in</a>
        </p>
      </form>
    </section>
  </main>
</body>
</html>
