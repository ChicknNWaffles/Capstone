<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="../static/style.css" />
</head>

<body class="page">
  <main class="wrap">
    <section class="card">
      <h1 class="title">Create Account</h1>
      <p class="sub">Sign up to get started</p>

      <form class="form" onsubmit="return false;">
        <label class="field">
          <input class="input" type="text" id="username" placeholder="Username" autocomplete="username" />
        </label>

        <label class="field">
          <input class="input" type="email" id="email" placeholder="Email (optional)" autocomplete="email" />
        </label>

        <label class="field">
          <input class="input" type="password" id="password" placeholder="Password" autocomplete="new-password" />
        </label>

        <button class="btn" type="button" id="signupBtn">Sign Up</button>

        <p class="foot">
          Already have an account?
          <a class="link strong" href="login.html">Sign in</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("signupBtn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Username and password required");
        return;
      }

      try {
        const response = await fetch("http://localhost:8000/api/signup/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, email, password }),
          credentials: "include"
        });

        const text = await response.text();

        if (response.ok) {
          alert("Account created");
          window.location.href = "home.html"; // must exist
        } else {
          alert("Signup failed: " + text);
        }
      } catch (err) {
        alert("Backend not running");
        console.error(err);
      }
    });
  </script>
</body>
</html>
