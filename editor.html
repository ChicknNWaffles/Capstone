{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>CoCodingStudio | editor</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>

<body>
    <div class="ide-container">
        <!-- Sidebar -->
        <div class="sidebar glass fileDirectoryBar" style="border-right: 1px solid rgba(255, 255, 255, 0.06);">
            <!-- Settings button and Explorer title -->
            <div class="sidebar-header">
                <span class="sidebar-title" id="explorerTitle" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 15ch;">Explorer</span>
                <div class="sidebar-actions">
                    <button class="icon-btn" title="Settings">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <button class="icon-btn" title="New File">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    </button>
                </div>
            </div>
            <div class="sidebar-content file-tree" id="fileTreeContainer">
                <div class="panel-placeholder">Loading workspace...</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Tab Bar -->
            <div id="tabHeaders" class="tab-bar glass">
                <button class="tab active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
                    File Hierarchy
                </button>
            </div>

            <!-- Workspace -->
            <div class="editor-content" id="workspace">
                <div class="openFiles" style="padding: 2rem; color: #a0a0a0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                    <svg viewBox="0 0 24 24" width="64" height="64" opacity="0.2" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 1rem;"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    <h2 style="color: white; margin-bottom: 0.5rem; font-weight: 500;">Welcome to CoCodingStudio</h2>
                    <p style="font-size: 0.9rem;">Select a file from the explorer to start editing.</p>
                </div>
            </div>

            <!-- Terminal -->
            <div class="terminal-panel glass">
                <div class="terminal-header" style="display: flex; justify-content: space-between; align-items: center; padding-right: 15px;">
                    <div class="terminal-tab active">Command Terminal</div>
                    <div id="kill-terminal-btn" style="cursor: pointer; opacity: 0.7; transition: opacity 0.2s;" title="Kill Terminal">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </div>
                </div>
                <div class="terminal-content" style="flex: 1; min-height: 0;"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/></svg>
                <span id="projectName">Loading Project...</span>
            </div>
            <div class="status-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
                <span id="commitName">Loading Commit...</span>
            </div>
        </div>
        <div class="status-right">
            <div class="status-item">UTF-8</div>
            <div class="status-item">Python</div>
        </div>
    </div>

</body>
<script>
    // API Calls to the backend:------------
    const Host = "http://127.0.0.1:8000"

    // gets the name of the current project
    async function getProjectName() {
        const URL = Host + "/api/getProjName"
        try {
            const result = await fetch(URL)
            const data = await result.json()
            var projNameSpot = document.getElementById("projectName")
            if (projNameSpot) projNameSpot.innerHTML = data.name || "Default Project";
            var explorerSpot = document.getElementById("explorerTitle");
            if (explorerSpot) explorerSpot.innerHTML = data.name || "Default Project";
        } catch (e) {
            // Dummy Data Fallback
            var projNameSpot = document.getElementById("projectName")
            if (projNameSpot) projNameSpot.innerHTML = "My Capstone App";
            var explorerSpot = document.getElementById("explorerTitle");
            if (explorerSpot) explorerSpot.innerHTML = "My Capstone App";
        }
    }
    getProjectName()

    // gets the name of the current commit
    async function getCommitName(){
        const URL = Host + "/api/getComName"
        try {
            const result = await fetch(URL)
            const data = await result.json()
            var comNameSpot = document.getElementById("commitName")
            if (comNameSpot) comNameSpot.innerHTML = data.name || "main";
        } catch (e) {
            // Dummy Data Fallback
            var comNameSpot = document.getElementById("commitName")
            if (comNameSpot) comNameSpot.innerHTML = "initial-commit-a1b2c3d";
        }
    }
    getCommitName()

    // Render file tree recursively
    function renderFileTree(dirTree, container) {
        container.innerHTML = '';
        
        function renderNode(name, node, parentEl, level) {
            const isFile = (node === "file");
            const indent = level * 12 + 10;
            
            const itemDiv = document.createElement('div');
            itemDiv.className = `tree-item ${isFile ? '' : 'folder'}`;
            itemDiv.style.paddingLeft = `${indent}px`;
            
            // Icon
            const iconDiv = document.createElement('div');
            iconDiv.className = 'tree-icon';
            if (!isFile) {
                iconDiv.className += ' chevron expanded';
                iconDiv.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
            } else {
                iconDiv.className += ' file-icon';
                if (name.endsWith('.html')) { iconDiv.className += ' html'; iconDiv.innerText = '<>'; }
                else if (name.endsWith('.js')) { iconDiv.className += ' js'; iconDiv.innerText = 'JS'; }
                else if (name.endsWith('.css')) { iconDiv.className += ' css'; iconDiv.innerText = '#'; }
                else if (name.endsWith('.json')) { iconDiv.className += ' json'; iconDiv.innerText = '{}'; }
                else if (name.match(/\.(png|jpg|jpeg|svg)$/i)) { iconDiv.className += ' image'; iconDiv.innerText = 'img'; }
                else if (name.endsWith('.py')) { iconDiv.style.color = '#3b82f6'; iconDiv.innerText = 'py'; }
                else { iconDiv.innerText = '≡'; }
            }
            itemDiv.appendChild(iconDiv);
            
            // Label
            const labelSpan = document.createElement('span');
            labelSpan.className = 'tree-label';
            labelSpan.textContent = name;
            itemDiv.appendChild(labelSpan);
            
            parentEl.appendChild(itemDiv);
            
            if (!isFile) {
                const childrenContainer = document.createElement('div');
                parentEl.appendChild(childrenContainer);
                
                // Toggle folder
                itemDiv.onclick = (e) => {
                    e.stopPropagation();
                    const isExpanded = iconDiv.classList.contains('expanded');
                    if (isExpanded) {
                        iconDiv.classList.remove('expanded');
                        iconDiv.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6" transform="rotate(-90 12 12)"/></svg>`;
                        childrenContainer.style.display = 'none';
                    } else {
                        iconDiv.classList.add('expanded');
                        iconDiv.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
                        childrenContainer.style.display = 'block';
                    }
                };
                
                // Render children
                Object.keys(node).sort().forEach(childName => {
                    renderNode(childName, node[childName], childrenContainer, level + 1);
                });
            } else {
                // File click
                itemDiv.onclick = () => {
                    // highlight item
                    document.querySelectorAll('.tree-item').forEach(el => {
                        el.style.backgroundColor = '';
                        el.classList.remove('selected');
                    });
                    itemDiv.style.backgroundColor = 'rgba(255, 255, 255, 0.1)';
                    itemDiv.classList.add('selected');
                };
            }
        }
        
        // Root is always '/'
        if (dirTree['/']) {
            Object.keys(dirTree['/']).sort().forEach(childName => {
                renderNode(childName, dirTree['/'][childName], container, 0);
            });
        }
    }

    // gets the directories of all of the files in the current commit
    async function getFileDirectories() {
        const URL = Host + "/files/get/"
        try {
            const result = await fetch(URL)
            const data = await result.json()
            var files = data.files
            var sorted = sortDirectories(files)
            
            // Render to the actual DOM Explorer
            const fileTreeContainer = document.getElementById("fileTreeContainer");
            if (fileTreeContainer) {
                renderFileTree(sorted, fileTreeContainer);
            }
        } catch (e) {
            // Dummy Data Fallback
            const dummyFiles = [
                { name: "index.html" },
                { name: "script.js" },
                { name: "style.css" },
                { name: "README.md" }
            ];
            const sortedDummy = sortDirectories(dummyFiles);
            const fileTreeContainer = document.getElementById("fileTreeContainer");
            if (fileTreeContainer) {
                renderFileTree(sortedDummy, fileTreeContainer);
            }
        }
    }
    getFileDirectories()

    // sorts the files into directories
    function sortDirectories(files) {
        topLevel = {"/": {}}
        for (var i = 0; i < files.length; i++) {
            var file = files[i]
            var relPath = file.name
            var prevLevels = []
            var at = "/"
            var bottomFolder = topLevel[at]
            while (relPath.includes("/")) {
                var before = relPath.substr(0, relPath.indexOf("/"))
                var curFolder = topLevel
                for (var j = 0; j < prevLevels.length; j++) {
                    curFolder = curFolder[prevLevels[j]]
                }
                curFolder = curFolder[at]
                if (Object.hasOwn(curFolder, before) == false) {
                    curFolder[before] = {}
                }
                curFolder = curFolder[before]
                prevLevels.push(at)
                at = before
                relPath = relPath.substr(relPath.indexOf("/") + 1)
                bottomFolder = curFolder
            }
            bottomFolder[relPath] = "file"
        }
        return topLevel
    }

    // --- Terminal Setup ---
    document.addEventListener("DOMContentLoaded", () => {
        const terminalContainer = document.querySelector('.terminal-content');
        if (terminalContainer) {
            const term = new Terminal({
                cursorBlink: true,
                theme: {
                    background: '#1e1e1e',
                    foreground: '#f0f0f0'
                }
            });
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(terminalContainer);
            fitAddon.fit();

            // Connect to WebSocket
            const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
            const terminalSocket = new WebSocket(`${wsScheme}://${window.location.host}/ws/terminal/`);

            terminalSocket.onopen = () => {
                console.log("Terminal WebSocket Connected");
                term.focus();
            };

            terminalSocket.onmessage = (event) => {
                term.write(event.data);
            };

            terminalSocket.onclose = () => {
                 term.write('\r\n\x1b[31m[WebSocket Disconnected]\x1b[0m\r\n');
            };

            term.onData(data => {
                if (terminalSocket.readyState === WebSocket.OPEN) {
                    terminalSocket.send(data);
                }
            });
            
            // Handle Kill Button
            const killBtn = document.getElementById('kill-terminal-btn');
            if (killBtn) {
                // Add hover effects
                killBtn.addEventListener('mouseenter', () => killBtn.style.opacity = '1');
                killBtn.addEventListener('mouseleave', () => killBtn.style.opacity = '0.7');
                killBtn.addEventListener('mousedown', () => killBtn.style.color = '#ff6b6b');
                killBtn.addEventListener('mouseup', () => killBtn.style.color = 'currentColor');
                
                // Send kill signal
                killBtn.addEventListener('click', () => {
                    if (terminalSocket.readyState === WebSocket.OPEN) {
                        terminalSocket.send(JSON.stringify({ type: "kill" }));
                    }
                });
            }

            // Handle resizing
            window.addEventListener('resize', () => {
                fitAddon.fit();
                if (terminalSocket.readyState === WebSocket.OPEN) {
                    terminalSocket.send(JSON.stringify({
                        type: "resize",
                        cols: term.cols,
                        rows: term.rows
                    }));
                }
            });
        }
    });
</script>

</html>
